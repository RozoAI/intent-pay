packages:
  - "examples/nextjs-app"
  - "packages/connectkit"
  - "packages/pay-common"

allowBuilds:
  "@reown/appkit": true
  bigint-buffer: true
  blake-hash: true
  bufferutil: true
  core-js: true
  esbuild: true
  keccak: true
  msw: true
  protobufjs: true
  secp256k1: true
  sharp: true
  tiny-secp256k1: true
  unrs-resolver: true
  usb: true
  utf-8-validate: true

overrides:
  playwright-core: "1.61.1"
  "@stellar/stellar-sdk": "^14.4.3"
  rollup: "^3.29.5"
  bs58: "^6.0.0"
  "@solana/sysvars": "^3.0.3"
  utf-8-validate: "6.0.6"
  react: "18.2.0"
  react-dom: "18.2.0"
  viem: "^2.23.2"
  wagmi: "^2.14.11"

dedupePeerDependents: true

minimumReleaseAge: 0

peerDependencyRules:
  allowedVersions:
    "@stellar/stellar-sdk": "14"
    rollup: "3"
    react: "18"
    "@types/react": "18"
  ignoreMissing:
    - react-native
